<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Events India</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="header-inner">
      <div class="header-left">
        <span class="logo">⚡ AI Events India</span>
        <span class="tagline">Your radar for every AI event across India</span>
      </div>
      <div class="header-right">
        <span id="new-badge" class="new-badge hidden">0 new</span>
        <button id="refresh-btn" class="btn-primary" onclick="triggerScrape()">
          <span id="refresh-label">Refresh Events</span>
        </button>
      </div>
    </div>
  </header>

  <div class="layout">
    <!-- Sidebar Filters -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <h3>Status</h3>
        <div class="filter-group" id="status-filters">
          <label class="filter-chip active" data-filter="status" data-value="upcoming">
            <input type="radio" name="status" value="upcoming" checked hidden /> Upcoming
          </label>
          <label class="filter-chip" data-filter="status" data-value="ongoing">
            <input type="radio" name="status" value="ongoing" hidden /> Ongoing
          </label>
          <label class="filter-chip" data-filter="status" data-value="past">
            <input type="radio" name="status" value="past" hidden /> Past
          </label>
          <label class="filter-chip" data-filter="status" data-value="">
            <input type="radio" name="status" value="" hidden /> All
          </label>
        </div>
      </div>

      <div class="sidebar-section">
        <h3>Event Type</h3>
        <div class="filter-group" id="type-filters">
          <label class="filter-chip active" data-filter="event_type" data-value="">All</label>
          <label class="filter-chip" data-filter="event_type" data-value="conference">Conference</label>
          <label class="filter-chip" data-filter="event_type" data-value="summit">Summit</label>
          <label class="filter-chip" data-filter="event_type" data-value="meetup">Meetup</label>
          <label class="filter-chip" data-filter="event_type" data-value="workshop">Workshop</label>
          <label class="filter-chip" data-filter="event_type" data-value="hackathon">Hackathon</label>
          <label class="filter-chip" data-filter="event_type" data-value="webinar">Webinar</label>
        </div>
      </div>

      <div class="sidebar-section">
        <h3>City</h3>
        <div class="filter-group" id="city-filters">
          <label class="filter-chip active" data-filter="city" data-value="">All India</label>
          <label class="filter-chip" data-filter="city" data-value="Bangalore">Bangalore</label>
          <label class="filter-chip" data-filter="city" data-value="Mumbai">Mumbai</label>
          <label class="filter-chip" data-filter="city" data-value="Delhi">Delhi</label>
          <label class="filter-chip" data-filter="city" data-value="Hyderabad">Hyderabad</label>
          <label class="filter-chip" data-filter="city" data-value="Chennai">Chennai</label>
          <label class="filter-chip" data-filter="city" data-value="Pune">Pune</label>
          <label class="filter-chip" data-filter="city" data-value="Kolkata">Kolkata</label>
        </div>
      </div>

      <div class="sidebar-section">
        <button class="btn-ghost full-width" id="show-new-btn" onclick="showNewOnly()">
          Show New Only
        </button>
        <button class="btn-ghost full-width" id="mark-seen-btn" onclick="markAllSeen()" style="margin-top:8px">
          Mark All Seen
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main>
      <div class="main-header">
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="Search events, cities, organizers..." oninput="handleSearch()" />
        </div>
        <div class="view-controls">
          <span id="event-count" class="event-count">Loading...</span>
          <button class="view-btn active" id="grid-btn" onclick="setView('grid')">▦ Grid</button>
          <button class="view-btn" id="list-btn" onclick="setView('list')">☰ List</button>
        </div>
      </div>

      <!-- Stats Bar -->
      <div class="stats-bar" id="stats-bar">
        <div class="stat"><span class="stat-num" id="stat-total">—</span><span class="stat-label">Total</span></div>
        <div class="stat"><span class="stat-num" id="stat-new">—</span><span class="stat-label">New</span></div>
        <div class="stat"><span class="stat-num" id="stat-upcoming">—</span><span class="stat-label">Upcoming</span></div>
      </div>

      <!-- Events Grid -->
      <div class="events-container grid" id="events-container">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Fetching AI events...</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
